<!DOCTYPE html>
    <html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
              rel="stylesheet">

        <script src="https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js"></script>

        <link href="atlas.css" rel="stylesheet">

        <style id="dynamic-css"></style>
    </head>

    <body>

    <div class="search-input">
        <input
            type="search"
            id="search-input"
            class="form-control"
            placeholder="Search..."
            value="dungeon location">
    </div>

    <svg
        viewBox="-1284 -2618 3564 3564"
        xmlns="http://www.w3.org/2000/svg"
        style="width:100%;height:100%;">

        <g
            id="atlas-group"
            transform="matrix(3.6466190067585558 0 0 3.6466190067585558 -3030 3625)">

            <image
                href="{image_url}"
                 preserveAspectRatio="none" 
                 x="{zone_x}" 
                 y="{zone_y}" 
                 width="{zone_w}" 
                 height="{zone_h}">


                <title>Sanctuary Eastern Continent</title>

            </image>

            <g transform="scale(-1,1) rotate(45)">

    {joined_region_boundries}

    {joined_markers}

            </g>

        </g>

    </svg>

    <script src="atlas.js"></script>

    </body>
    </html>
